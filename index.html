<!-- 
prompt - запрос. обязательно
negative_prompt - негативный запрос (чего не хотим видеть на картинке)
num_inference_steps - количество шагов для генерации (int 1 - 50)

guidance_scale - насколько строго результат должен соответствовать запросу
    (float, 1 - 20. default = 7.5)
    Лучше 7-10. Больше 15 - перенасыщенные цвета
                Меньше 5 - очень плохое будет соответствие

seed - начальный шум (int)

strength - насколько абстрагироваться от картинки-референса, если такая есть
    (float 0 - 1)

height / width (int) - ширина и высота


const data = await request.json();

const options = {
  prompt: data.prompt,
  negative_prompt: data.negative_prompt || "blurry, low quality, distorted", // Дефолтный негатив
  num_inference_steps: data.steps || 30,
  guidance_scale: data.guidance || 7.5,
  seed: data.seed || Math.floor(Math.random() * 1000000) // Случайный, если не задан
};

const response = await env.AI.run('@cf/stabilityai/stable-diffusion-xl-base-1.0', options);
